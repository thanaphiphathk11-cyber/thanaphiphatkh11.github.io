<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ผลการเรียน</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: url('bg.jpg') no-repeat center center fixed;
  background-size: cover;
}

/* header */
.header {
  background: #1e1e1e;
  height: 60px;
  padding: 0 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  width: 35px;
}

.menu {
  color: white;
  font-size: 26px;
}

/* กล่อง */
.container {
  max-width: 500px;
  margin: 20px auto;
  background: rgba(255,255,255,0.95);
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 0 10px rgba(0,0,0,0.2);
}

/* ปี */
.year {
  font-size: 60px;
  font-weight: bold;
  padding: 20px;
  background: #eee;
}

/* table */
table {
  width: 100%;
  border-collapse: collapse;
}

th {
  background: #ddd;
}

th, td {
  padding: 12px;
  border: 1px solid #ccc;
  text-align: center;
}

/* สีเกรด */
.f {
  color: red;
  font-weight: bold;
}

/* footer */
.footer {
  margin-top: 20px;
  padding: 15px;
  font-size: 14px;
  color: #333;
  background: rgba(255,255,255,0.9);
  display: flex;
  gap: 10px;
  align-items: flex-start;
}

.footer img {
  width: 40px;
}
</style>

</head>

<body>

<!-- header -->
<div class="header">
  <img src="appicon-mini.png" class="appicon-mini">
  <div class="menu">☰</div>
</div>

<!-- content -->
<div class="container">
  <div class="year">2568</div>

  <table>
    <tr>
      <th>วิชา</th>
      <th>ภาคเรียน</th>
      <th>เกรด</th>
    </tr>

    <tr><td>RAM1141</td><td>1</td><td class="C">F*</td></tr>
    <tr><td>RAM1111</td><td>1</td><td class="C">C*</td></tr>
    <tr><td>RAM1103</td><td>1</td><td class="f">C*</td></tr>
    <tr><td>LAW2106</td><td>1</td><td class="f">F</td></tr>
    <tr><td>LAW1106</td><td>1</td><td class="f">F</td></tr>
    <tr><td>LAW1101</td><td>1</td><td class="f">F</td></tr>
  </table>
</div>

<!-- footer -->
<div class="footer">
  <img src="logo.png">
  <div>
    พัฒนาระบบโดย ฝ่ายพัฒนาและบริการสื่อเทคโนโลยีสารสนเทศ<br>
    สถาบันคอมพิวเตอร์ มหาวิทยาลัยรามคำแหง<br>
    หากมีปัญหาในการเข้าใช้งานระบบ e-Service ติดต่อ 02-310-8845
  </div>
</div>

</body>
</html>
