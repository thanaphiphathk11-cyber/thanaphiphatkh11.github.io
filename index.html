<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ผลการเรียน</title>

<style>
body {
  font-family: Arial;
  margin: 0;
}

/* HEADER */
.header {
  background: #222;
  padding: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  height: 40px;
}

.menu {
  color: white;
  font-size: 24px;
  cursor: pointer;
}

/* DROPDOWN MENU */
.dropdown {
  max-height: 0;
  overflow: hidden;
  background: #333;
  transition: max-height 0.3s ease;
}

.dropdown.show {
  max-height: 200px;
}

.dropdown a {
  display: block;
  padding: 12px;
  color: white;
  text-decoration: none;
  border-top: 1px solid #444;
}

.dropdown a:hover {
  background: #444;
}

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  padding: 12px;
  border: 1px solid #ddd;
  text-align: center;
}

.year {
  font-size: 40px;
}

.f {
  color: red;
}

/* FOOTER */
.footer {
  background: #222;
  color: white;
  padding: 15px;
  font-size: 14px;
}

.footer img {
  width: 40px;
}
</style>

</head>

<body>

<!-- HEADER -->
<div class="header">
  <img src="appicon-mini.png" class="appicon-mini">
  <div class="menu" onclick="toggleMenu()">☰</div>
</div>

<!-- DROPDOWN -->
<div id="dropdown" class="dropdown">
  <a href="#">หน้าแรก</a>
  <a href="#">ผลการเรียน</a>
  <a href="#">ออกจากระบบ</a>
</div>

<!-- TABLE -->
<table>
<tr><th colspan="3" class="year">2568</th></tr>
<tr>
  <th>วิชา</th>
  <th>ภาคเรียน</th>
  <th>เกรด</th>
</tr>

<tr><td>RAM1141</td><td>1</td><td class="f">F*</td></tr>
<tr><td>RAM1111</td><td>1</td><td class="f">C*</td></tr>
<tr><td>RAM1103</td><td>1</td><td class="f">C*</td></tr>
<tr><td>LAW2106</td><td>1</td><td class="f">F</td></tr>
<tr><td>LAW1106</td><td>1</td><td class="f">F</td></tr>
<tr><td>LAW1101</td><td>1</td><td class="f">F</td></tr>
</table>

<!-- FOOTER -->
<div class="footer">
  <img src="appicon-mini.png"><br><br>
  พัฒนาระบบโดย ฝ่ายพัฒนาและบริการสื่อเทคโนโลยีสารสนเทศ<br>
  สถาบันคอมพิวเตอร์ มหาวิทยาลัยรามคำแหง<br>
  หากมีปัญหา ติดต่อ 02-310-8845
</div>

<script>
function toggleMenu() {
  var menu = document.getElementById("dropdown");
  menu.classList.toggle("show");
}
</script>

</body>
</html>
